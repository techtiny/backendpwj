# ============================================
# Procurement Tracker - Application Configuration
# ============================================
spring.application.name=pwj-tracker-service
server.port=${PORT:8081}
server.address=0.0.0.0

# Force IST timezone — Railway servers run UTC
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
user.timezone=Asia/Kolkata

# ============================================
# ACTIVE PROFILE: use 'dev' for H2, 'prod' for MySQL
# ============================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# Actuator
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
info.app.name=Procurement Tracker
info.app.version=1.0.0

# ============================================
# Logging
# ============================================
logging.level.com.pwj=DEBUG
logging.level.org.springframework.web=INFO

# ============================================
# File Upload
# ============================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
pwj.upload.dir=${UPLOAD_DIR:uploads}

# ============================================
# Mail (Gmail SMTP — update credentials below)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# Weekly Report Recipients
# ============================================
pwj.report.email.from=${MAIL_USERNAME:your-email@gmail.com}
pwj.report.email.to=${REPORT_EMAIL_TO:admin@example.com}
pwj.newentry.email.to=${NEWENTRY_EMAIL_TO:bharath3101@gmail.com,sevengearsmotors@gmail.com,anusha@happizo.com}

# ============================================
# Weekly Backup (every Saturday 9 PM)
# ============================================
pwj.backup.email.to=${BACKUP_EMAIL_TO:admin@happizo.com}

# ============================================
# Anthropic Claude API (for vendor image extraction)
# Set via environment variable: ANTHROPIC_API_KEY=sk-ant-...
# ============================================
anthropic.api.key=${ANTHROPIC_API_KEY:}
