# ============================================
# DEV Profile - Local MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/pwj_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_LOCAL_USER:root}
spring.datasource.password=${MYSQL_LOCAL_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
