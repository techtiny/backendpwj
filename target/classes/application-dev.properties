# ============================================
# DEV Profile - H2 In-Memory Database
# ============================================
spring.datasource.url=jdbc:h2:mem:pwjdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# IMPORTANT: use 'create' not 'create-drop' so table survives for data.sql seeding
spring.jpa.hibernate.ddl-auto=create

# This tells Spring to run data.sql AFTER Hibernate has created the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
